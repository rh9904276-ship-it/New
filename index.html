<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Saidul ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Hind Siliguri', sans-serif;
background: radial-gradient(circle at center, #111, #000);
color:#fff;
overflow:hidden;
}

/* Rain */
.rain{
position:fixed;
width:100%;
height:100%;
background:url('https://i.ibb.co/9q2YfBv/rain.gif');
opacity:0.12;
}

/* Proposal Image */
.proposal{
position:fixed;
width:100%;
height:100%;
background:url('https://i.ibb.co/7v8YqgH/proposal-love.jpg') center/cover no-repeat;
opacity:0;
transition:2s;
z-index:-1;
}

/* Floating Emoji */
.emoji{
position:fixed;
font-size:20px;
animation:floatUp linear infinite;
pointer-events:none;
}

@keyframes floatUp{
0%{transform:translateY(100vh); opacity:1;}
100%{transform:translateY(-10vh); opacity:0;}
}

/* Container */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
max-width:400px;
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,0,100,0.2);
}

/* Title */
h1{
color:#fff;
text-shadow:0 0 15px rgba(255,255,255,0.7);
animation:heartbeat 1.5s infinite;
}

@keyframes heartbeat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.15);}
}

/* Text */
.text{
margin-top:20px;
font-size:18px;
min-height:130px;
line-height:1.8;
color:#fff;
}

/* Bangla fix */
.bangla{
color:#fff;
font-weight:500;
}

/* Button */
.btn{
margin-top:25px;
padding:12px 25px;
background:linear-gradient(45deg,#ff4d6d,#ff1a4d);
border:none;
border-radius:30px;
cursor:pointer;
font-size:16px;
color:#fff;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff4d6d;
}
</style>
</head>

<body>

<div class="proposal" id="proposal"></div>
<div class="rain"></div>

<div class="container">

<h1>💖 Nisu 💖</h1>

<div id="text" class="text"></div>

<button class="btn" onclick="next()">Next 💕</button>

</div>

<script>

let texts = [
"Nisu...",
"তোর কাছে হয়তো আমি খুব সাধারণ একজন মানুষ, কিন্তু আমার কাছে তুই পুরো একটা দুনিয়া… 💔",
"তুই হয়তো অনেকবার আমার মনটা ভেঙে দিয়েছিস...",
"তবুও জানিস… আমি এখনও তোকে আগের মতোই ভালোবাসি...",
"আমি শুধু চাই তুই আমাকে একটু বুঝিস...",
"সবকিছুর পরেও, তুই আমার কাছে এখনও special… ❤️",
"💖 I Love You Nisu 💖",
"— Sani 💕"
];

let i = 0;
let typing = false;

/* Bangla wrap */
function formatText(txt){
return txt.replace(/([\u0980-\u09FF]+)/g, '<span class="bangla">$1</span>');
}

/* Typing FIXED */
function type(txt){
let el = document.getElementById("text");
typing = true;

let j = 0;

let inter = setInterval(()=>{
el.innerText = txt.slice(0, j);
j++;

if(j > txt.length){
clearInterval(inter);

/* শেষে HTML render */
el.innerHTML = formatText(txt);

typing = false;

if(i === texts.length){
document.getElementById("proposal").style.opacity = "0.7";
}
}
},35);
}

function next(){
if(typing) return;

if(i < texts.length){
type(texts[i]);
i++;
}
}

/* Auto start */
window.onload = () => {
next();
};

/* Floating Emojis */
let emojis = ["❤️","💖","💕","💓","💞","💘"];

setInterval(()=>{
let e = document.createElement("div");
e.className="emoji";
e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

e.style.left = Math.random()*100 + "vw";
e.style.animationDuration = (3 + Math.random()*3) + "s";
e.style.fontSize = (15 + Math.random()*25) + "px";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},6000);

},300);

</script>

</body>
  </html>
